name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm test
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install -r examples/production-dashboard/requirements.txt
      - run: pytest examples/production-dashboard/tests
        env:
          PYTHONPATH: examples/production-dashboard
