services:
  - type: web
    name: fyr-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FYR_SECRET_KEY
        generateValue: true
      - key: FYR_SECURE_COOKIES
        value: true
