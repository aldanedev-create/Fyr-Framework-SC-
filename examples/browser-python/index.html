<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fyr Browser Python</title><style>body{max-width:760px;margin:56px auto;padding:0 20px;font-family:system-ui;background:#f4f7fc;color:#17233b}main{padding:28px;background:#fff;border-radius:16px}textarea,code{width:100%;box-sizing:border-box;padding:12px;border:1px solid #ccd6e7;border-radius:9px;font:14px ui-monospace,monospace}textarea{min-height:180px}code{display:block;min-height:70px;white-space:pre-wrap;background:#10192c;color:#e0e9ff}button{margin:12px 0;border:0;border-radius:8px;padding:10px 14px;background:#285bd9;color:#fff;font-weight:700;cursor:pointer}</style></head><body><main fyr-app="python-demo"><p>Fyr reactive UI + browser Python</p><h1>Run a Python expression</h1><textarea fyr-model="code"></textarea><button fyr-click="runPython()">Run in browser</button><p fyr-text="status"></p><code fyr-text="output"></code></main><script type="module" src="./app.js"></script></body></html>
