<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fyr + FastAPI</title><style>body{max-width:700px;margin:50px auto;padding:0 20px;font-family:system-ui;background:#f6f8fc;color:#17233b}main{background:#fff;padding:28px;border-radius:16px;box-shadow:0 16px 40px #193d8018}form{display:flex;gap:8px}input,select{padding:10px;border:1px solid #cad5e8;border-radius:8px}input{flex:1}button{border:0;background:#285bd7;color:#fff;padding:10px 13px;border-radius:8px;font-weight:700;cursor:pointer}li{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #e8edf5}li[data-done="true"] span{text-decoration:line-through;color:#76839a}.meta{color:#64738e;font-size:.9rem}</style></head><body><main fyr-app="fastapi-demo"><p class="meta">Fyr HTTP client + FastAPI</p><h1>Release checklist</h1><p fyr-text="status"></p><form fyr-submit="addItem()"><input fyr-model="draft" placeholder="New checklist item"><select fyr-model="priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><button>Add</button></form><ul><template fyr-for="items in visibleItems"><li fyr-bind:data-done="items.done"><span><strong fyr-text="items.title"></strong> · <small fyr-text="items.priority"></small></span><button fyr-click="toggleItem(items.id)">Toggle</button></li></template></ul></main><script type="module" src="/assets/app.js"></script></body></html>
